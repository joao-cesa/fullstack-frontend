<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciar Imóveis - ImobCRUD</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <nav class="navbar">
    <span class="logo">ImobCRUD</span>
    <div class="nav-links">
      <a href="properties.html" class="active">Imóveis</a>
      <a href="users.html">Usuários</a>
      <a href="profile.html">Meu Perfil</a>
      <button id="logoutBtn" class="btn-logout-link">Sair</button>
    </div>
  </nav>

  <div class="container main-content">
    <div class="dashboard-header">
      <h1>Gerenciamento de Imóveis</h1>
      <button id="openModalBtn" class="btn-primary">+ Novo Imóvel</button>
    </div>

    <div id="propertyModal" class="modal-overlay">
      <div class="modal-content">
        <h2 id="formTitle">Cadastrar Novo Imóvel</h2>
        <form id="propertyForm">
          <input type="hidden" id="propertyId" />
          <div class="form-group">
            <label for="propertyTitle">Título</label>
            <input type="text" id="propertyTitle" placeholder="Ex: Casa Condomínio" required />
          </div>
          <div class="form-group">
            <label for="propertyAddress">Endereço</label>
            <input type="text" id="propertyAddress" placeholder="Rua, Número, Bairro" required />
          </div>
          <div class="form-group">
            <label for="propertyPurchasePrice">Preço de Compra (R$)</label>
            <input type="number" id="propertyPurchasePrice" placeholder="0.00" required />
          </div>
          <div class="form-group">
            <label for="propertyStatus">Status</label>
            <select id="propertyStatus" required>
              <option value="">Selecione...</option>
              <option value="em_analise">Em Análise</option>
              <option value="comprado_leilao">Comprado em Leilão</option>
              <option value="em_reforma">Em Reforma</option>
              <option value="vendido">Vendido</option>
            </select>
          </div>
          <div class="form-actions" style="display: flex; gap: 10px;">
            <button type="submit" class="btn-success">Salvar Imóvel</button>
            <button type="button" id="closeModalBtn" class="btn-secondary">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
    <div class="card mt-20">
      <div style="display: flex; gap: 10px;">
        <input type="text" id="searchBox" class="search-box" placeholder="Buscar imóveis...">
        <select id="filterStatus" class="search-box">
          <option value="">Todos os Status</option>
          <option value="em_analise">Em Análise</option>
          <option value="comprado_leilao">Comprado em Leilão</option>
          <option value="em_reforma">Em Reforma</option>
          <option value="vendido">Vendido</option>
        </select>
      </div>
      <table class="table">
        <thead>
          <tr>
            <th style="width: 25%;">Título</th>
            <th style="width: 30%;">Endereço</th>
            <th style="width: 15%;">Preço</th>
            <th style="width: 15%;">Status</th>
            <th style="width: 15%;">Ações</th>
          </tr>
        </thead>
        <tbody id="propertiesList">
        </tbody>
      </table>
      <div id="pagination" class="pagination"></div>
    </div>


    <script src="authGuard.js"></script>
    <script src="utils.js"></script>
    <script src="properties.js"></script>
</body>

</html>
